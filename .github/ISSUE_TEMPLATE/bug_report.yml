name: Bug report
description: Report a reproducible defect in ClawPowers-Agent
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include exact versions for clawpowers-agent, clawpowers, and OpenClaw, plus whether the issue happened in stock OpenClaw runtime, plugin install, or skill sync.
  - type: input
    id: versions
    attributes:
      label: Versions
      placeholder: clawpowers-agent 1.1.0, clawpowers 2.2.0, openclaw 2026.4.5
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node version, install method, OpenClaw profile
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
